<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Service Progress Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; color: #00d9ff; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .upload-area {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 60px 40px;
      text-align: center;
      background: #16213e;
      transition: all 0.3s;
      margin-bottom: 30px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #00d9ff;
      background: #1a2744;
    }
    .upload-area input { display: none; }
    .upload-btn {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    .upload-btn:hover { transform: scale(1.05); }
    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .option-group {
      background: #16213e;
      padding: 20px;
      border-radius: 8px;
    }
    .option-group label {
      display: block;
      margin-bottom: 8px;
      color: #888;
      font-size: 14px;
    }
    .option-group select, .option-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
    }
    .progress-container {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      display: none;
    }
    .progress-container.active { display: block; }
    .progress-bar-bg {
      height: 30px;
      background: #1a1a2e;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border-radius: 15px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1a1a2e;
      font-size: 14px;
    }
    .progress-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      font-size: 14px;
    }
    .progress-info-item {
      background: #1a1a2e;
      padding: 10px 15px;
      border-radius: 6px;
    }
    .progress-info-label { color: #888; font-size: 12px; margin-bottom: 4px; }
    .progress-info-value { color: #00d9ff; font-weight: bold; }
    .status-log {
      background: #0f0f1a;
      border-radius: 8px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    .status-log .entry {
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #1a1a2e;
      border-radius: 4px;
      border-left: 3px solid #444;
    }
    .status-log .entry.start { border-left-color: #00d9ff; }
    .status-log .entry.progress { border-left-color: #ffcc00; }
    .status-log .entry.complete { border-left-color: #00ff88; }
    .status-log .entry.error { border-left-color: #ff4444; }
    .status-log .timestamp { color: #666; font-size: 11px; }
    .result-container {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
      display: none;
    }
    .result-container.active { display: block; }
    .download-btn {
      display: inline-block;
      background: #00ff88;
      color: #1a1a2e;
      padding: 12px 30px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Media Service Progress Demo</h1>
    <p class="subtitle">Upload a file and watch real-time processing progress</p>
    
    <div class="options">
      <div class="option-group">
        <label>Processing Type</label>
        <select id="processType">
          <option value="audio">Audio Transcoding</option>
          <option value="video-audio">Extract Audio from Video</option>
          <option value="video-frames">Extract Keyframes</option>
        </select>
      </div>
      <div class="option-group">
        <label>Output Format</label>
        <select id="audioFormat">
          <option value="mp3">MP3</option>
          <option value="wav">WAV</option>
          <option value="ogg">OGG</option>
        </select>
      </div>
      <div class="option-group">
        <label>Sample Rate</label>
        <select id="sampleRate">
          <option value="16000">16 kHz (Voice)</option>
          <option value="44100">44.1 kHz (CD)</option>
          <option value="48000">48 kHz (Studio)</option>
        </select>
      </div>
    </div>
    
    <div class="upload-area" id="uploadArea">
      <div style="font-size: 48px; margin-bottom: 15px;">📁</div>
      <p>Drop your file here or click to browse</p>
      <input type="file" id="fileInput" accept="audio/*,video/*">
      <button class="upload-btn">Select File</button>
    </div>
    
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%">0%</div>
      </div>
      <div class="progress-info">
        <div class="progress-info-item">
          <div class="progress-info-label">Status</div>
          <div class="progress-info-value" id="statusText">Waiting...</div>
        </div>
        <div class="progress-info-item">
          <div class="progress-info-label">Frame</div>
          <div class="progress-info-value" id="frameText">-</div>
        </div>
        <div class="progress-info-item">
          <div class="progress-info-label">FPS</div>
          <div class="progress-info-value" id="fpsText">-</div>
        </div>
        <div class="progress-info-item">
          <div class="progress-info-label">Time</div>
          <div class="progress-info-value" id="timeText">-</div>
        </div>
      </div>
    </div>
    
    <div class="status-log" id="statusLog"></div>
    
    <div class="result-container" id="resultContainer">
      <h3>Processing Complete!</h3>
      <p id="resultInfo"></p>
      <a href="#" class="download-btn" id="downloadBtn" download>Download Result</a>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusLog = document.getElementById('statusLog');
    const resultContainer = document.getElementById('resultContainer');
    
    uploadArea.querySelector('.upload-btn').addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('click', (e) => { if (e.target === uploadArea) fileInput.click(); });
    
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    });
    
    fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); });
    
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="timestamp">${time}</span> ${message}`;
      statusLog.appendChild(entry);
      statusLog.scrollTop = statusLog.scrollHeight;
    }
    
    async function processFile(file) {
      uploadArea.style.display = 'none';
      progressContainer.classList.add('active');
      statusLog.innerHTML = '';
      resultContainer.classList.remove('active');
      
      const processType = document.getElementById('processType').value;
      const format = document.getElementById('audioFormat').value;
      const sampleRate = document.getElementById('sampleRate').value;
      
      log(`Starting: ${file.name}`, 'start');
      updateProgress(0, 'Uploading...');
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('format', format);
      formData.append('sample_rate', sampleRate);
      formData.append('channels', '1');
      
      let endpoint = '/v1/process/audio';
      if (processType.includes('video')) {
        endpoint = '/v1/process/video';
        formData.append('mode', processType === 'video-audio' ? 'extract_audio' : 'extract_keyframes');
        if (processType === 'video-frames') formData.append('fps', '1');
      }
      
      try {
        const response = await fetch(endpoint, { method: 'POST', body: formData });
        if (!response.ok) throw new Error((await response.json()).error || 'Failed');
        
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        
        document.getElementById('resultInfo').textContent = 
          `Processed ${file.name} (${(blob.size / 1024).toFixed(1)} KB)`;
        document.getElementById('downloadBtn').href = url;
        document.getElementById('downloadBtn').download = `processed_${file.name}`;
        resultContainer.classList.add('active');
        
        log('Complete!', 'complete');
        updateProgress(100, 'Complete');
      } catch (error) {
        log(`Error: ${error.message}`, 'error');
        updateProgress(0, 'Failed');
      }
    }
    
    function updateProgress(percent, status, metadata = {}) {
      progressBar.style.width = `${percent}%`;
      progressBar.textContent = `${Math.round(percent)}%`;
      document.getElementById('statusText').textContent = status;
      if (metadata.frame) document.getElementById('frameText').textContent = metadata.frame;
      if (metadata.fps) document.getElementById('fpsText').textContent = metadata.fps;
      if (metadata.time) document.getElementById('timeText').textContent = `${metadata.time.toFixed(1)}s`;
    }
  </script>
</body>
</html>
