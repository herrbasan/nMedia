<div class="page-task-explorer">
	<section class="input-section">
		<nui-card>
			<h3 style="margin-top: 0">Input</h3>

			<div class="dropzone-area" id="dropzone">
				<nui-icon name="cloud_upload">☁</nui-icon>
				<p id="dropzone-hint">Drag & drop a file here, or click to browse</p>
				<input type="file" id="file-input" hidden />
			</div>

			<nui-input-group style="margin-top: var(--nui-space)">
				<label for="input-path">Or use server path</label>
				<nui-input>
					<input type="text" id="input-path" placeholder="D:\\Media\\input\\file.jpg" />
				</nui-input>
			</nui-input-group>

			<nui-input-group style="margin-top: var(--nui-space)">
				<label for="output-path">Output path (optional)</label>
				<nui-input>
					<input type="text" id="output-path" placeholder="D:\\Media\\output" />
				</nui-input>
			</nui-input-group>

			<nui-input-group style="margin-top: var(--nui-space)">
				<nui-checkbox>
					<input type="checkbox" id="upload-toggle" checked />
					<label for="upload-toggle">Upload file to server</label>
				</nui-checkbox>
			</nui-input-group>

			<div id="file-info" style="margin-top: var(--nui-space); font-size: 0.9rem; color: var(--color-text-secondary);"></div>
		</nui-card>

		<nui-card style="margin-top: var(--nui-space)">
			<h3 style="margin-top: 0">Processor</h3>
			<nui-select id="processor-select">
				<select>
					<option value="image">Image</option>
					<option value="audio">Audio</option>
					<option value="video">Video</option>
				</select>
			</nui-select>
		</nui-card>
	</section>

	<section class="options-section" id="options-section">
		<nui-card>
			<h3 style="margin-top: 0">Options</h3>
			<div id="dynamic-options"></div>
		</nui-card>
	</section>

	<section class="preview-section">
		<nui-card>
			<h3 style="margin-top: 0">API Request</h3>
			<nui-tabs id="command-tabs">
				<div role="tablist">
					<button role="tab" aria-selected="true">cURL</button>
					<button role="tab">Fetch</button>
					<button role="tab">JSON</button>
				</div>
				<div role="tabpanel">
					<pre class="command-preview" id="curl-preview"></pre>
				</div>
				<div role="tabpanel" hidden>
					<pre class="command-preview" id="fetch-preview"></pre>
				</div>
				<div role="tabpanel" hidden>
					<pre class="command-preview" id="json-preview"></pre>
				</div>
			</nui-tabs>
			<nui-button-container>
				<nui-button><button type="button" id="copy-cmd">Copy</button></nui-button>
				<nui-button variant="primary"><button type="button" id="run-btn">Run Test</button></nui-button>
			</nui-button-container>
		</nui-card>

		<nui-card id="result-card" hidden>
			<h3 style="margin-top: 0">Result</h3>
			<div id="result-area"></div>
		</nui-card>
	</section>
</div>

<script type="nui/page">
function init(element, params, nui) {
	// --- State ---
	let selectedFile = null;
	let fileId = null;
	let uploadMode = true;
	let currentSSE = null;

	// --- DOM refs ---
	const dropzone = element.el('#dropzone');
	const fileInput = element.el('#file-input');
	const inputPath = element.el('#input-path');
	const outputPath = element.el('#output-path');
	const fileInfo = element.el('#file-info');
	const processorSelect = element.el('#processor-select select');
	const dynamicOptions = element.el('#dynamic-options');
	const curlPreview = element.el('#curl-preview');
	const fetchPreview = element.el('#fetch-preview');
	const jsonPreview = element.el('#json-preview');
	const runBtn = element.el('#run-btn');
	const copyBtn = element.el('#copy-cmd');
	const resultCard = element.el('#result-card');
	const resultArea = element.el('#result-area');
	const uploadToggle = element.el('#upload-toggle');
	const dropzoneHint = element.el('#dropzone-hint');

	// --- Codec/Format definitions ---
	const VIDEO_CODECS = {
		'CPU Encoders': {
			'libx264': 'H.264 (x264)',
			'libx265': 'H.265/HEVC (x265)',
			'libsvtav1': 'AV1 (SVT-AV1)',
			'libvpx-vp9': 'VP9 (libvpx)',
			'libvpx-vp8': 'VP8 (libvpx)',
			'mpeg4': 'MPEG-4',
			'mpeg2video': 'MPEG-2',
		},
		'NVIDIA NVENC': {
			'h264_nvenc': 'H.264 (NVENC)',
			'hevc_nvenc': 'HEVC (NVENC)',
			'av1_nvenc': 'AV1 (NVENC)',
		},
		'Intel QuickSync (QSV)': {
			'h264_qsv': 'H.264 (QSV)',
			'hevc_qsv': 'HEVC (QSV)',
			'av1_qsv': 'AV1 (QSV)',
		},
		'VAAPI (AMD/Intel)': {
			'h264_vaapi': 'H.264 (VAAPI)',
			'hevc_vaapi': 'HEVC (VAAPI)',
			'av1_vaapi': 'AV1 (VAAPI)',
		},
	};

	const VIDEO_CONTAINERS = ['mp4', 'webm', 'mkv', 'mov', 'avi', 'ts'];

	const AUDIO_CODECS = {
		'libmp3lame': 'MP3 (LAME)',
		'aac': 'AAC',
		'libopus': 'Opus',
		'libvorbis': 'Vorbis (OGG)',
		'flac': 'FLAC (lossless)',
		'pcm_s16le': 'WAV (PCM 16-bit)',
		'pcm_s24le': 'WAV (PCM 24-bit)',
		'pcm_f32le': 'WAV (PCM 32-bit float)',
		'ac3': 'AC3 (Dolby Digital)',
		'eac3': 'E-AC3 (Dolby Digital+)',
	};

	const AUDIO_FORMATS = ['mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac', 'opus'];

	// --- Options definitions ---
	const OPTIONS_DEF = {
		image: [
			{ section: 'Output' },
			{ name: 'format', label: 'Format', type: 'select', options: ['jpeg','png','webp','avif'], default: 'jpeg',
				help: 'AVIF quality is auto-scaled (slider × 0.55)' },
			{ name: 'quality', label: 'Quality', type: 'range', min: 1, max: 100, default: 85 },
			{ name: 'max_dimension', label: 'Max Dimension', type: 'number', min: 1, max: 10000, default: 1024,
				help: 'Longest edge in pixels' },
			{ name: 'strip_exif', label: 'Strip EXIF', type: 'checkbox', default: true },

			{ section: 'Transforms' },
			{ name: 'rotate', label: 'Rotate', type: 'select', options: ['','90','180','270'], default: '' },
			{ name: 'flip', label: 'Flip Vertical', type: 'checkbox', default: false },
			{ name: 'flop', label: 'Flip Horizontal', type: 'checkbox', default: false },
			{ name: 'grayscale', label: 'Grayscale', type: 'checkbox', default: false },
			{ name: 'normalize', label: 'Normalize Contrast', type: 'checkbox', default: false },
			{ name: 'blur', label: 'Blur Sigma', type: 'range', min: 0, max: 20, step: 0.5, default: 0 },
		],
		audio: [
			{ section: 'Output' },
			{ name: 'format', label: 'Format', type: 'select', options: AUDIO_FORMATS, default: 'mp3' },
			{ name: 'sample_rate', label: 'Sample Rate', type: 'select',
				options: ['source','8000','16000','22050','44100','48000'], default: 'source',
				help: '"source" preserves original sample rate' },
			{ name: 'channels', label: 'Channels', type: 'select',
				options: ['source','1','2'], default: 'source',
				help: '1=mono, 2=stereo, "source" preserves original' },
			{ name: 'bitrate', label: 'Bitrate (kbps)', type: 'select',
				options: ['','64','96','128','160','192','256','320'], default: '',
				help: 'Applied to lossy formats (MP3/AAC/OGG/Opus). Empty = encoder default.' },
		],
		video: [
			{ section: 'Mode' },
			{ name: 'mode', label: 'Mode', type: 'select',
				options: ['extract_audio','extract_keyframes','transcode','cli'], default: 'transcode' },

			{ section: 'Transcode', modes: ['transcode','cli'] },
			{ name: 'video_codec', label: 'Video Codec', type: 'codec-select', codecs: VIDEO_CODECS, default: 'libx264' },
			{ name: 'audio_codec', label: 'Audio Codec', type: 'select',
				options: ['','aac','libmp3lame','libopus','libvorbis','flac','copy'], default: 'aac',
				help: '"copy" passes through original audio stream' },
			{ name: 'output_format', label: 'Container', type: 'select', options: VIDEO_CONTAINERS, default: 'mp4' },
			{ name: 'hwaccel', label: 'HW Acceleration', type: 'select',
				options: ['','cuda','vaapi','qsv','nvdec'], default: '',
				help: 'Auto-set for NVENC/QSV/VAAPI codecs. Override for custom decode.' },
			{ name: 'crf', label: 'CRF / Quality', type: 'range', min: 0, max: 51, default: 23,
				help: 'Lower = better quality. 0=lossless, 18=visually lossless, 23=default, 51=worst.' },
			{ name: 'preset', label: 'Encoding Preset', type: 'select',
				options: ['','ultrafast','superfast','veryfast','faster','fast','medium','slow','slower','veryslow'],
				default: 'medium',
				help: 'Slower = better compression/quality. NVENC maps to p1-p7.' },
			{ name: 'max_dimension', label: 'Max Dimension', type: 'number', min: 1, max: 10000, default: 1024,
				help: 'Longest edge. Leave empty to preserve original.' },
			{ name: 'audio_bitrate', label: 'Audio Bitrate (bps)', type: 'select',
				options: ['','64000','96000','128000','160000','192000','256000','320000'], default: '128000' },
			{ name: 'no_audio', label: 'No Audio (-an)', type: 'checkbox', default: false },
			{ name: 'no_video', label: 'No Video (-vn)', type: 'checkbox', default: false },

			{ section: 'Keyframes', modes: ['extract_keyframes'] },
			{ name: 'fps', label: 'FPS', type: 'number', min: 1, max: 30, default: 1 },
			{ name: 'max_dimension_kf', label: 'Max Frame Size', type: 'number', min: 1, max: 10000, default: 1024 },

			{ section: 'Audio Extract', modes: ['extract_audio'] },
			{ name: 'extract_format', label: 'Audio Format', type: 'select', options: ['mp3','wav','ogg','m4a'], default: 'mp3' },

			{ section: 'CLI Passthrough', modes: ['cli'] },
			{ name: 'cli_command', label: 'FFmpeg CLI Args', type: 'text', default: '',
				placeholder: '-c:v libx264 -crf 23 -preset medium -c:a aac -b:a 128k',
				help: 'Raw FFmpeg arguments. Overrides all other transcode options.' },
		],
	};

	// --- Dropzone ---
	function updateDropzoneHint() {
		dropzoneHint.textContent = uploadMode
			? 'Drag & drop a file here, or click to browse'
			: 'Click to pick a file via system dialog (path will be captured)';
	}

	dropzone.addEventListener('click', async () => {
		if (uploadMode) {
			fileInput.click();
		} else {
			if (window.showOpenFilePicker) {
				try {
					const [handle] = await window.showOpenFilePicker();
					const file = await handle.getFile();
					let filePath = handle.path || file.path || null;
					handleFile(file, filePath);
				} catch { /* cancelled */ }
			} else {
				fileInput.click();
			}
		}
	});

	dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
	dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
	dropzone.addEventListener('drop', (e) => {
		e.preventDefault();
		dropzone.classList.remove('drag-over');
		const file = e.dataTransfer.files[0];
		if (file) handleFile(file, file.path || null);
	});
	fileInput.addEventListener('change', (e) => {
		if (e.target.files[0]) handleFile(e.target.files[0], e.target.files[0].path || null);
	});

	function handleFile(file, filePath) {
		selectedFile = file;
		fileId = null;
		fileInfo.textContent = `${file.name} — ${api.formatBytes(file.size)}`;
		if (filePath && filePath.length > 1 && filePath[1] === ':') {
			inputPath.value = filePath;
		} else if (!uploadMode && !inputPath.value) {
			fileInfo.textContent += ' (path not available — enter server path manually)';
		}
		updatePreview();
	}

	// --- Options UI builder ---
	function buildOptionsUI() {
		const processor = processorSelect.value;
		const defs = OPTIONS_DEF[processor] || [];
		const currentMode = getModeValue();
		dynamicOptions.innerHTML = '';

		defs.forEach(def => {
			// Section headers
			if (def.section) {
				const header = document.createElement('h4');
				header.textContent = def.section;
				header.style.cssText = 'margin: var(--nui-space-double) 0 var(--nui-space-half); font-size: 0.95rem; color: var(--color-text-secondary); border-bottom: 1px solid var(--border-shade1); padding-bottom: var(--nui-space-quarter);';
				dynamicOptions.appendChild(header);
				return;
			}

			// Mode-filtered options
			if (def.modes && !def.modes.includes(currentMode)) return;

			const group = document.createElement('nui-input-group');
			group.style.marginTop = 'var(--nui-space)';

			const label = document.createElement('label');
			label.textContent = def.label;
			group.appendChild(label);

			let inputWrapper;
			if (def.type === 'codec-select') {
				// Grouped codec select with optgroups
				inputWrapper = document.createElement('nui-select');
				const select = document.createElement('select');
				select.dataset.optName = def.name;
				for (const [groupName, codecs] of Object.entries(def.codecs)) {
					const optgroup = document.createElement('optgroup');
					optgroup.label = groupName;
					for (const [value, displayName] of Object.entries(codecs)) {
						const option = document.createElement('option');
						option.value = value;
						option.textContent = displayName;
						if (value === def.default) option.selected = true;
						optgroup.appendChild(option);
					}
					select.appendChild(optgroup);
				}
				inputWrapper.appendChild(select);
			} else if (def.type === 'select') {
				inputWrapper = document.createElement('nui-select');
				const select = document.createElement('select');
				select.dataset.optName = def.name;
				def.options.forEach(opt => {
					const option = document.createElement('option');
					option.value = opt;
					option.textContent = opt || '(none)';
					if (opt === def.default) option.selected = true;
					select.appendChild(option);
				});
				inputWrapper.appendChild(select);
			} else if (def.type === 'checkbox') {
				inputWrapper = document.createElement('nui-checkbox');
				const input = document.createElement('input');
				input.type = 'checkbox';
				input.dataset.optName = def.name;
				input.checked = def.default;
				inputWrapper.appendChild(input);
				const lbl = document.createElement('label');
				lbl.textContent = def.label;
				inputWrapper.appendChild(lbl);
			} else if (def.type === 'range') {
				inputWrapper = document.createElement('nui-slider');
				const input = document.createElement('input');
				input.type = 'range';
				input.dataset.optName = def.name;
				input.min = def.min;
				input.max = def.max;
				if (def.step) input.step = def.step;
				input.value = def.default;
				inputWrapper.appendChild(input);
			} else {
				inputWrapper = document.createElement('nui-input');
				const input = document.createElement('input');
				input.type = def.type;
				input.dataset.optName = def.name;
				input.value = def.default;
				if (def.placeholder) input.placeholder = def.placeholder;
				if (def.min !== undefined) input.min = def.min;
				if (def.max !== undefined) input.max = def.max;
				inputWrapper.appendChild(input);
			}

			group.appendChild(inputWrapper);

			// Help text
			if (def.help) {
				const help = document.createElement('small');
				help.textContent = def.help;
				help.style.cssText = 'display: block; color: var(--color-text-secondary); font-size: 0.75rem; margin-top: 2px;';
				group.appendChild(help);
			}

			dynamicOptions.appendChild(group);
		});

		dynamicOptions.querySelectorAll('input, select').forEach(el => {
			el.addEventListener('change', updatePreview);
			el.addEventListener('input', updatePreview);
		});
	}

	function getModeValue() {
		const modeEl = dynamicOptions.querySelector('[data-opt-name="mode"]');
		return modeEl ? modeEl.value : 'transcode';
	}

	function collectOptions() {
		const processor = processorSelect.value;
		const defs = OPTIONS_DEF[processor] || [];
		const currentMode = getModeValue();
		const opts = {};

		defs.forEach(def => {
			if (def.section) return;
			if (def.modes && !def.modes.includes(currentMode)) return;

			const el = dynamicOptions.querySelector(`[data-opt-name="${def.name}"]`);
			if (!el) return;

			let val;
			if (def.type === 'checkbox') val = el.checked;
			else if (def.type === 'number') val = parseInt(el.value) || 0;
			else if (def.type === 'range') val = parseFloat(el.value);
			else val = el.value;

			if (val === '' || val === false) return;
			if (val === def.default && def.name !== 'mode') return;

			// Special handling for audio bitrate
			if (def.name === 'bitrate' && val) {
				opts.audio_bitrate = parseInt(val) * 1000;
				return;
			}

			// Map extract_format to format for audio extract mode
			if (def.name === 'extract_format') {
				opts.format = val;
				return;
			}

			// Map max_dimension_kf to max_dimension for keyframes
			if (def.name === 'max_dimension_kf') {
				opts.max_dimension = val;
				return;
			}

			opts[def.name] = val;
		});

		return opts;
	}

	function buildRequest() {
		const processor = processorSelect.value;
		const opts = collectOptions();
		const outPath = outputPath.value.trim();
		const req = { processor, options: opts };

		if (uploadMode && fileId) {
			req.fileId = fileId;
		} else if (inputPath.value.trim()) {
			req.input_path = inputPath.value.trim();
		}
		if (outPath) req.output_path = outPath;

		return req;
	}

	function updatePreview() {
		const req = buildRequest();
		const endpoint = '/v1/process';
		const headers = { 'Content-Type': 'application/json' };

		curlPreview.textContent = api.buildCurl(endpoint, 'POST', headers, req);
		fetchPreview.textContent = api.buildFetch(endpoint, 'POST', headers, req);
		jsonPreview.textContent = JSON.stringify(req, null, 2);
	}

	// --- Run ---
	runBtn.addEventListener('click', async () => {
		if (currentSSE) { currentSSE.close(); currentSSE = null; }

		resultCard.hidden = false;
		resultArea.innerHTML = '<nui-progress type="busy"></nui-progress> <p>Running...</p>';

		try {
			if (uploadMode && selectedFile && !fileId) {
				resultArea.innerHTML = '<p>Uploading...</p>';
				const upload = await api.upload(selectedFile, (pct) => {
					resultArea.innerHTML = `<p>Uploading: ${pct}%</p>`;
				});
				fileId = upload.fileId;
			}

			const req = buildRequest();
			if (!req.fileId && !req.input_path) {
				resultArea.innerHTML = '<nui-banner type="warning"><span>Please provide a file or input path.</span></nui-banner>';
				return;
			}

			resultArea.innerHTML = `<p>Starting job...</p>`;
			const job = await api.process(req);

			if (job.error) {
				resultArea.innerHTML = `<nui-banner type="alert"><span>${job.error}</span></nui-banner>`;
				return;
			}
			if (!job.jobId) {
				resultArea.innerHTML = `<nui-banner type="alert"><span>Failed to create job</span></nui-banner>`;
				return;
			}

			let progressHtml = `<p>Job: <code>${job.jobId}</code> — Status: ${job.status}</p>
				<nui-progress value="0" id="job-progress"></nui-progress>
				<p id="job-message"></p>`;
			resultArea.innerHTML = progressHtml;

			currentSSE = api.subscribeProgress(job.jobId, (data) => {
				const progressEl = resultArea.el('#job-progress');
				const msgEl = resultArea.el('#job-message');
				if (progressEl) progressEl.setAttribute('value', data.percent || 0);
				if (msgEl) msgEl.textContent = data.message || data.type;

				if (data.type === 'complete') {
					_showResult(data.assetId, data.metadata);
				} else if (data.type === 'error') {
					resultArea.innerHTML += `<hr/><p><nui-badge variant="danger">Error</nui-badge> ${data.error}</p>`;
				}
			});

			function _showResult(assetId, metadata) {
				const processor = processorSelect.value;
				const mode = collectOptions().mode;
				let html = `<hr/><p><nui-badge variant="success">Complete</nui-badge> Asset ID: <code>${assetId}</code></p>`;

				if (outputPath.value.trim()) {
					html += `<p>Written to: <code>${outputPath.value.trim()}</code></p>`;
				}

				api.getAsset(assetId).then((blob) => {
					const url = URL.createObjectURL(blob);

					if (processor === 'image') {
						html += `<div class="result-preview"><img src="${url}" alt="Result" style="max-width:100%;max-height:400px;border-radius:4px;border:1px solid var(--border-shade1);"></div>`;
						if (metadata?.cropAssetIds && metadata.cropAssetIds.length > 1) {
							html += `<p><strong>Crop results (${metadata.cropAssetIds.length}):</strong></p><div class="crop-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:var(--nui-space);">`;
							for (const cropId of metadata.cropAssetIds.slice(1)) {
								html += `<nui-card style="padding:4px"><img src="${API_BASE}/v1/assets/${cropId}" alt="crop" style="width:100%;border-radius:4px;"></nui-card>`;
							}
							html += `</div>`;
						}
					} else if (processor === 'audio') {
						html += `<audio controls src="${url}" style="width:100%;margin-top:var(--nui-space);"></audio>`;
					} else if (processor === 'video') {
						if (mode === 'extract_keyframes') {
							html += `<div class="result-preview"><img src="${url}" alt="First keyframe" style="max-width:100%;max-height:400px;border-radius:4px;border:1px solid var(--border-shade1);"></div>`;
							if (metadata?.frameCount) html += `<p>Extracted ${metadata.frameCount} keyframes</p>`;
						} else if (mode === 'extract_audio') {
							html += `<audio controls src="${url}" style="width:100%;margin-top:var(--nui-space);"></audio>`;
						} else {
							html += `<video controls src="${url}" style="max-width:100%;max-height:400px;border-radius:4px;border:1px solid var(--border-shade1);"></video>`;
						}
					}

					html += `<nui-button-container style="margin-top:var(--nui-space)">
						<nui-button><button type="button" data-action="download-asset" data-asset="${assetId}">Download</button></nui-button>
					</nui-button-container>`;

					resultArea.innerHTML += html;
				}).catch((err) => {
					html += `<p><nui-badge variant="warning">Preview unavailable</nui-badge> ${err.message}</p>
						<nui-button><button type="button" data-action="download-asset" data-asset="${assetId}">Download</button></nui-button>`;
					resultArea.innerHTML += html;
				});
			}
		} catch (err) {
			resultArea.innerHTML = `<nui-banner type="alert"><span>${err.message}</span></nui-banner>`;
		}
	});

	// Download handler
	resultArea.addEventListener('click', async (e) => {
		const btn = e.target.closest('[data-action="download-asset"]');
		if (!btn) return;
		try {
			const blob = await api.getAsset(btn.dataset.asset);
			const url = URL.createObjectURL(blob);
			const a = document.createElement('a');
			a.href = url;
			a.download = btn.dataset.asset;
			a.click();
			URL.revokeObjectURL(url);
		} catch (err) {
			nui.components.banner.show({ content: err.message, priority: 'alert' });
		}
	});

	// Copy command
	copyBtn.addEventListener('click', () => {
		const tabs = element.el('#command-tabs');
		const activeIndex = tabs.querySelector('[role="tab"][aria-selected="true"]')?.tabIndex || 0;
		let text;
		switch (activeIndex) {
			case 0: text = curlPreview.textContent; break;
			case 1: text = fetchPreview.textContent; break;
			default: text = jsonPreview.textContent;
		}
		navigator.clipboard.writeText(text).then(() => {
			nui.components.banner.show({ content: 'Copied to clipboard', priority: 'info', autoClose: 2000 });
		});
	});

	// Processor change
	processorSelect.addEventListener('change', () => { buildOptionsUI(); updatePreview(); });
	inputPath.addEventListener('input', updatePreview);
	outputPath.addEventListener('input', updatePreview);

	uploadToggle.addEventListener('change', (e) => {
		uploadMode = e.target.checked;
		if (!uploadMode) fileId = null;
		updateDropzoneHint();
		updatePreview();
	});

	element.hide = () => { if (currentSSE) { currentSSE.close(); currentSSE = null; } };

	buildOptionsUI();
	updatePreview();
}
</script>
