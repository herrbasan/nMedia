<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Media Service Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
  
  <!-- NUI Theme CSS -->
  <link rel="stylesheet" href="/modules/nui_wc2/NUI/css/nui-theme.css">
  
  <!-- Admin Custom CSS -->
  <link rel="stylesheet" href="/admin/css/admin.css">
  
  <!-- FOUC Prevention -->
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    nui-app:not(.nui-ready) { display: none; }
    nui-loading:not(.active) { display: none; }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <nui-loading mode="bar"></nui-loading>
  
  <nui-app nui-vars-sidebar_width="16rem" nui-vars-sidebar_force-breakpoint="75rem">
    <!-- Skip links for accessibility -->
    <nui-skip-links></nui-skip-links>

    <nui-app-header>
      <div slot="left">
        <nui-button data-action="toggle-sidebar">
          <button type="button" aria-label="Toggle navigation menu">
            <nui-icon name="menu">☰</nui-icon>
          </button>
        </nui-button>
        <h1>Media Service Admin</h1>
      </div>
      <div slot="center">
        <nui-badge id="service-status" priority="info">Connecting...</nui-badge>
      </div>
      <div slot="right">
        <nui-button data-action="refresh-status" title="Refresh Status">
          <button type="button" aria-label="Refresh service status">
            <nui-icon name="sync">↻</nui-icon>
          </button>
        </nui-button>
        <nui-button data-action="toggle-theme">
          <button type="button" aria-label="Toggle light/dark theme">
            <nui-icon name="brightness">⛭</nui-icon>
          </button>
        </nui-button>
      </div>
    </nui-app-header>

    <nui-sidebar>
      <nui-link-list mode="fold">
        <!-- Navigation loaded from JSON via JavaScript -->
      </nui-link-list>
    </nui-sidebar>

    <nui-content>
      <nui-main>
        <!-- Content pages loaded here -->
      </nui-main>
    </nui-content>
    
    <nui-app-footer>
      <div id="appFooterInfo">Ready</div>
      <nui-button class="icon-only" data-action="scroll-to-top" id="scrollToTop">
        <button type="button" aria-label="Scroll to top">
          <nui-icon name="arrow" style="transform: rotate(-90deg)"></nui-icon>
        </button>
      </nui-button>
    </nui-app-footer>
  </nui-app>

  <!-- NUI Library -->
  <script type="module" src="/modules/nui_wc2/NUI/nui.js"></script>
  
  <!-- Admin App -->
  <script type="module" src="/admin/js/app.js"></script>
</body>
</html>
