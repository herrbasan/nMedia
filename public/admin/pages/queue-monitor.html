<div class="page-queue-monitor">
<header>
    <h2><nui-icon name="queue">🖥</nui-icon> Queue Monitor</h2>
    <p class="lead">Live view of active jobs</p>
</header>

<section>
    <nui-card>
        <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;">
            <nui-button id="refresh-jobs-btn">
                <button type="button"><nui-icon name="refresh">↻</nui-icon> Refresh</button>
            </nui-button>
            <nui-button id="clear-completed-btn">
                <button type="button"><nui-icon name="clear">✕</nui-icon> Clear Completed</button>
            </nui-button>
            <nui-select id="job-filter" style="min-width:140px;">
                <select>
                    <option value="all">All</option>
                    <option value="queued">Queued</option>
                    <option value="processing">Processing</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </nui-select>
        </div>
        <div id="job-list">
            <p style="color:var(--nui-text-muted)">Loading jobs...</p>
        </div>
    </nui-card>
</section>

<script type="nui/page">function init(element, params, nui) { adminApp.initQueueMonitorPage(element, nui); }</script>
</div>
