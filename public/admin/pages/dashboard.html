<div class="page-dashboard">
<header>
    <h2><nui-icon name="dashboard">📊</nui-icon> Dashboard</h2>
    <p class="lead">System overview and health</p>
</header>

<section>
    <nui-card>
        <div class="nui-headline">Processors</div>
        <div id="processor-list" style="display:grid;gap:0.5rem;">
            <p style="color:var(--nui-text-muted)">Loading...</p>
        </div>
    </nui-card>
</section>

<section style="margin-top:1rem;">
    <nui-card>
        <div class="nui-headline">Job Stats</div>
        <div id="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1rem;margin-top:0.5rem;">
            <p style="color:var(--nui-text-muted)">Loading...</p>
        </div>
    </nui-card>
</section>

<style>
.stat-box { background:var(--nui-surface-2); border-radius:8px; padding:1rem; text-align:center; }
.stat-value { font-size:1.75rem; font-weight:700; }
.stat-label { color:var(--nui-text-muted); font-size:0.85rem; }
</style>

<script type="nui/page">function init(element, params, nui) { adminApp.initDashboardPage(element, nui); }</script>
</div>
