<div class="page-task-builder">
<header>
    <h2><nui-icon name="build">🔧</nui-icon> Task Builder</h2>
    <p class="lead">Compose and run custom processing tasks</p>
</header>

<section>
    <nui-card>
        <div class="nui-headline">Input Source</div>
        <div class="builder-section">
            <div style="display:flex;gap:1rem;margin-bottom:0.75rem;">
                <label><input type="radio" name="input-type" value="file" checked> Upload File</label>
                <label><input type="radio" name="input-type" value="path"> Local Path</label>
            </div>
            <div id="input-file-panel">
                <nui-file-picker id="builder-file">
                    <input type="file">
                </nui-file-picker>
            </div>
            <div id="input-path-panel" style="display:none;">
                <nui-text-field id="builder-path">
                    <input type="text" placeholder="D:\\Media\\input.mp4">
                </nui-text-field>
            </div>
        </div>
    </nui-card>
</section>

<section style="margin-top:1rem;">
    <nui-card>
        <div class="nui-headline">Operation</div>
        <div class="builder-section">
            <nui-select id="builder-processor">
                <select>
                    <option value="image">Image</option>
                    <option value="audio">Audio</option>
                    <option value="video">Video</option>
                </select>
            </nui-select>
        </div>
        <div class="builder-section option-grid" id="builder-options">
            <!-- Populated by JS -->
        </div>
    </nui-card>
</section>

<section style="margin-top:1rem;">
    <nui-card>
        <div class="nui-headline">Output</div>
        <div class="builder-section">
            <div style="display:flex;gap:1rem;margin-bottom:0.75rem;">
                <label><input type="radio" name="output-type" value="display" checked> Display in Browser</label>
                <label><input type="radio" name="output-type" value="path"> Save to Path</label>
            </div>
            <div id="output-path-panel" style="display:none;">
                <nui-text-field id="builder-output-path">
                    <input type="text" value="D:\\Home\\Desktop" placeholder="D:\\Media\\output.mp3">
                </nui-text-field>
            </div>
        </div>
    </nui-card>
</section>

<section style="margin-top:1rem;">
    <nui-button variant="primary" id="run-builder-btn">
        <button type="button"><nui-icon name="play">▶</nui-icon> Run Task</button>
    </nui-button>
    <div id="builder-result" style="margin-top:1rem;"></div>
</section>

<script>
    // Simple tab toggle for input/output panels
    document.querySelectorAll('input[name="input-type"]').forEach(r => {
        r.addEventListener('change', () => {
            const filePanel = document.getElementById('input-file-panel');
            const pathPanel = document.getElementById('input-path-panel');
            if (r.value === 'file') { filePanel.style.display = ''; pathPanel.style.display = 'none'; }
            else { filePanel.style.display = 'none'; pathPanel.style.display = ''; }
        });
    });
    document.querySelectorAll('input[name="output-type"]').forEach(r => {
        r.addEventListener('change', () => {
            const panel = document.getElementById('output-path-panel');
            panel.style.display = r.value === 'path' ? '' : 'none';
        });
    });
</script>

<script type="nui/page">function init(element, params, nui) { adminApp.initTaskBuilderPage(element, nui); }</script>
</div>
