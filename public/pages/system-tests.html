<div class="page-system-tests">
	<header style="margin-bottom: var(--nui-space-double)">
		<h1>System Tests</h1>
		<p class="lead">Verify service functionality end-to-end.</p>
	</header>

	<nui-layout columns="2">
		<nui-card>
			<h3 style="margin-top: 0">API Connectivity</h3>
			<nui-button-container>
				<nui-button><button type="button" data-action="test-health">Health Check</button></nui-button>
				<nui-button><button type="button" data-action="test-capabilities">Capabilities</button></nui-button>
			</nui-button-container>
			<div id="api-result" style="margin-top: var(--nui-space)"></div>
		</nui-card>

		<nui-card>
			<h3 style="margin-top: 0">WebSocket</h3>
			<nui-button-container>
				<nui-button><button type="button" data-action="test-ws">Test Connection</button></nui-button>
				<nui-button><button type="button" data-action="test-ws-progress">Test Progress</button></nui-button>
			</nui-button-container>
			<div id="ws-result" style="margin-top: var(--nui-space)"></div>
		</nui-card>

		<nui-card>
			<h3 style="margin-top: 0">File Upload</h3>
			<input type="file" id="test-file" />
			<nui-button-container style="margin-top: var(--nui-space)">
				<nui-button><button type="button" data-action="test-upload">Upload Test File</button></nui-button>
			</nui-button-container>
			<div id="upload-result" style="margin-top: var(--nui-space)"></div>
		</nui-card>

		<nui-card>
			<h3 style="margin-top: 0">Progress Streaming</h3>
			<p style="font-size:0.85rem;color:var(--color-text-secondary)">Upload a file first, then test SSE progress.</p>
			<nui-button-container>
				<nui-button><button type="button" data-action="test-sse">Test SSE</button></nui-button>
			</nui-button-container>
			<div id="sse-result" style="margin-top: var(--nui-space)"></div>
		</nui-card>
	</nui-layout>
</div>

<script type="nui/page">
function init(element, params, nui) {
	const apiResult = element.el('#api-result');
	const wsResult = element.el('#ws-result');
	const uploadResult = element.el('#upload-result');
	const sseResult = element.el('#sse-result');
	const testFile = element.el('#test-file');

	let lastFileId = null;

	function ok(msg) { return `<nui-badge variant="success">PASS</nui-badge> ${msg}`; }
	function fail(msg) { return `<nui-badge variant="danger">FAIL</nui-badge> ${msg}`; }

	element.addEventListener('click', async (e) => {
		const actionEl = e.target.closest('[data-action]');
		if (!actionEl) return;
		const action = actionEl.dataset.action;

		switch (action) {
			case 'test-health': {
				apiResult.innerHTML = 'Testing...';
				try {
					const data = await api.health();
					apiResult.innerHTML = ok(`Service online on port ${data.port}`);
				} catch (err) {
					apiResult.innerHTML = fail(err.message);
				}
				break;
			}
			case 'test-capabilities': {
				apiResult.innerHTML = 'Testing...';
				try {
					const data = await api.capabilities();
					const modules = Object.keys(data).join(', ');
					apiResult.innerHTML = ok(`Modules: ${modules}`);
				} catch (err) {
					apiResult.innerHTML = fail(err.message);
				}
				break;
			}
			case 'test-ws': {
				wsResult.innerHTML = 'Connecting...';
				try {
					const ws = api.connectWebSocket(
						(msg) => {
							if (msg.type === 'connected') {
								wsResult.innerHTML = ok(`Connected, ID: ${msg.id}`);
							}
						},
						() => {},
						() => wsResult.innerHTML = fail('Disconnected')
					);
				} catch (err) {
					wsResult.innerHTML = fail(err.message);
				}
				break;
			}
			case 'test-ws-progress': {
				wsResult.innerHTML = 'Testing WS progress subscription...';
				try {
					// Use global WS connection to subscribe to a job
					if (!window.api.ws || window.api.ws.readyState !== WebSocket.OPEN) {
						wsResult.innerHTML = fail('WebSocket not connected. Connect first.');
						return;
					}
					// Create a quick job and subscribe via WS
					const job = await api.process({
						input_path: testFile.files[0]?.path || '',
						processor: 'image',
						options: { max_dimension: 100, format: 'jpeg' }
					});
					if (job.error || !job.jobId) {
						wsResult.innerHTML = fail(job.error || 'Failed to create job');
						return;
					}

					const events = [];
					const handler = (msg) => {
						if (msg.jobId === job.jobId) {
							events.push(msg.type);
							if (msg.type === 'complete') {
								wsResult.innerHTML = ok(`WS progress working — events: ${events.join(', ')}`);
								window.removeEventListener('ws-message', handler);
							} else if (msg.type === 'error') {
								wsResult.innerHTML = fail(`Job error: ${msg.error}`);
								window.removeEventListener('ws-message', handler);
							}
						}
					};
					window.addEventListener('ws-message', handler);
					window.api.ws.send(JSON.stringify({ type: 'subscribe', jobId: job.jobId }));
				} catch (err) {
					wsResult.innerHTML = fail(err.message);
				}
				break;
			}
			case 'test-upload': {
				const file = testFile.files[0];
				if (!file) {
					uploadResult.innerHTML = fail('Select a file first');
					return;
				}
				uploadResult.innerHTML = 'Uploading...';
				try {
					const data = await api.upload(file);
					lastFileId = data.fileId;
					uploadResult.innerHTML = ok(`Uploaded: ${data.fileId} (${data.detectedType}, ${api.formatBytes(data.size)})`);
				} catch (err) {
					uploadResult.innerHTML = fail(err.message);
				}
				break;
			}
			case 'test-sse': {
				if (!lastFileId) {
					sseResult.innerHTML = fail('Upload a file first using the File Upload test.');
					return;
				}
				sseResult.innerHTML = 'Starting test job...';
				try {
					const job = await api.process({
						fileId: lastFileId,
						processor: 'image',
						options: { max_dimension: 256, quality: 70, format: 'png' }
					});
					if (job.error || !job.jobId) {
						sseResult.innerHTML = fail(job.error || 'Failed to create job');
						return;
					}
					sseResult.innerHTML = `Job ${job.jobId} queued. Listening for progress...`;

					let events = [];
					api.subscribeProgress(job.jobId, (data) => {
						events.push(data.type);
						if (data.type === 'start') {
							sseResult.innerHTML = ok(`SSE working — received: ${events.join(', ')}`);
						} else if (data.type === 'complete') {
							sseResult.innerHTML = ok(`SSE complete — events: ${events.join(', ')}, Asset: ${data.assetId}`);
						} else if (data.type === 'error') {
							sseResult.innerHTML = fail(`Job error: ${data.error}`);
						}
					});
				} catch (err) {
					sseResult.innerHTML = fail(err.message);
				}
				break;
			}
		}
	});
}
</script>
